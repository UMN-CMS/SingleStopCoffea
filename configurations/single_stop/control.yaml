{% import 'singlestop_base.yaml' as base %}

analyzer:
  default_run_builder:
    strategy_name: LimitSysts
    systs:
      or_exprs:
        - "bjetshapesf*disabled"
        - "trigger*"

  ControlEmulation:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: NObjFilter
      input_col: LooseB
      selection_name: 0bjet
      max_count: 0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: selection
    {{ base.ht_cat() | indent(4) }}
    {{ base.singlestop_common_histograms() | indent(4) }}

  Control:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
      should_run:
        sample_type: Data
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: TriggerBNNCorrection
      base_path: postprocessing/newtriggereffs/
      correction_pattern: "{era}.json.gz"
    - module_name: NObjFilter
      input_col: LooseB
      selection_name: 0bjet
      max_count: 0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: selection
    {{ base.ht_cat() | indent(4) }}
    {{ base.singlestop_common_histograms() | indent(4) }}

post_common_mc_transforms: &post_common_mc_transforms
  - name: NormalizeSystematicByProjection
    normalize_within: ["HT_Cat"]
    pre_sf_name: "bjetshapesf-variation_disabled"
    post_sf_name: "central"
    variation_axis: "variation"
  - name: SelectAxesValues
    select_axes_values: {"variation": "central"}
  - name: MergeAxes
    merge_axis_names: ["HT_Cat"]

location_priorities: [".*FNAL.*", ".*US.*", ".*(DE|IT|CH|FR).*", ".*(T0|T1|T2).*","eos"]
# location_priorities: [".*(T0|T1|T2).*","eos"]

event_collections:
  # Data samples
  - dataset: 'data_JetHT_*'
    pipelines: [ControlEmulation]
  
  # Background MC Samples
  - dataset: 'qcd*'
    pipelines: [ControlEmulation, Control]
  - dataset: 'diboson*'
    pipelines: [ControlEmulation, Control]
  - dataset: 'tt_to_hadronic*'
    pipelines: [ControlEmulation, Control]
  - dataset: 'zjets_to_qq*'
    pipelines: [ControlEmulation , Control]
  - dataset: 'wjets_to_qq*'
    pipelines: [ControlEmulation, Control]
  - dataset: 'single_top*hadronic*'
    pipelines: [ControlEmulation, Control]


Postprocessing:
  processors:
    - name: RatioPlot
      inputs:
        - "*/*/*/composite_13_m"
        - "*/*/*/composite_14_m"
        - "*/*/*/comp_mChi"
        - "*/*/*/comp_mStop"
        - "*/*/*/uncomp_mChi"
        - "*/*/*/uncomp_mStop"
        - "*/*/*/HT"
      scale: log
      normalize: False
      structure:
        select: {dataset_name: "!Signal*"}
        group: {era.name: "*"}
        subgroups:
          denominator:
            select: {sample_type: MC, pipeline: Control}
            transforms:
              - *post_common_mc_transforms
              - name: SliceAxes
                slices: {0: [600,2500]}
          numerator:
            select: {sample_type: Data, pipeline: ControlEmulation}
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
              - name: SliceAxes
                slices: {0: [600,2500]}
      output_name: "{prefix}/control/{era.name}/ratio_{era.name}_{name}.png"

    - name: RatioPlot
      inputs:
        - "*/*/*/composite_24_m"
        - "*/*/*/uncomp_mChi"
      scale: log
      normalize: False
      structure:
        select: {dataset_name: "!Signal*"}
        group: {era.name: "*"}
        subgroups:
          denominator:
            select: {sample_type: MC, pipeline: Control}
            transforms:
              - *post_common_mc_transforms
              - name: SliceAxes
                slices: {0: [200,2500]}
          numerator:
            select: {sample_type: Data, pipeline: ControlEmulation}
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
              - name: SliceAxes
                slices: {0: [200,2500]}
      output_name: "{prefix}/control/{era.name}/ratio_{era.name}_{name}.png"

    - name: RatioPlot
      inputs:
        - "*/*/*/fatjet_pt_1"
      scale: log
      normalize: False
      structure:
        select: {dataset_name: "!Signal*"}
        group: {era.name: "*"}
        subgroups:
          denominator:
            select: {sample_type: MC, pipeline: Control}
            transforms:
              - *post_common_mc_transforms
              - name: SliceAxes
                slices: {0: [300,1500]}
          numerator:
            select: {sample_type: Data, pipeline: ControlEmulation}
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
              - name: SliceAxes
                slices: {0: [300,1000]}
      output_name: "{prefix}/control/{era.name}/ratio_{era.name}_{name}.png"


    - name: RatioPlot
      inputs:
        - "*/*/*/HT"
      scale: log
      normalize: False
      structure:
        select: {dataset_name: "qcd*"}
        group: {era.name: "*"}
        subgroups:
          denominator:
            select: {sample_type: MC, pipeline: Control}
            transforms:
              - name: MergeAxes
                merge_axis_names: ["HT_Cat"]
              - name: SelectAxesValues
                select_axes_values: {"variation": "bjetshapesf-variation_disabled"}
          numerator:
            select: {sample_type: MC, pipeline: Control}
            transforms:
              - name: MergeAxes
                merge_axis_names: ["HT_Cat"]
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
      output_name: "{prefix}/control/{era.name}/compare_bsf_{era.name}_{name}.png"


    - name: RatioPlot
      inputs:
        - "*/*/*/fatjet_pt_1"
        - "*/*/*/HT"
      scale: log
      normalize: False
      structure:
        select: {dataset_name: "qcd*"}
        group: {era.name: "*"}
        subgroups:
          denominator:
            select: {sample_type: MC, pipeline: Control}
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": "bjetshapesf-variation_disabled"}
              - name: MergeAxes
                merge_axis_names: ["HT_Cat"]
          numerator:
            select: {sample_type: MC, pipeline: Control}
            transforms:
              - name: NormalizeSystematicByProjection
                normalize_within: ["HT_Cat"]
                pre_sf_name: "bjetshapesf-variation_disabled"
                post_sf_name: "central"
                variation_axis: "variation"
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
              - name: MergeAxes
                merge_axis_names: ["HT_Cat"]

              - name: FormatTitle
                title_format: "With BSF Reweighting"
      output_name: "{prefix}/control/{era.name}/normalized_bsf_{era.name}_{name}.png"

    - name: RatioPlot
      inputs:
        - "*/*/*/HT"
        - "*/*/*/fatjet_pt_1"
      scale: log
      normalize: False
      structure:
        select: {dataset_name: "qcd*", sample_type: MC, pipeline: Control}
        group: {era.name: "*"}
        subgroups:
          denominator:
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
              - name: MergeAxes
                merge_axis_names: ["HT_Cat"]
              - name: SetStyle
                style: {color: black, plottype: errorbar, marker: o, linestyle: null}
              - name: FormatTitle
                title_format: "{dataset_name} Nominal"
          numerator:
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": ["triggereff-variation_up", "triggereff-variation_down"]}
              - name: MergeAxes
                merge_axis_names: ["HT_Cat"]
              - name: SetStyle
                style: {plottype: step, linewidth: 2}
              - name: FormatTitle
                title_format: "{axis_params.variation}"
      output_name: "{prefix}/control/{era.name}/triggereff_sys_{era.name}_{name}.png"
      plot_configuration:
        cms_text: "Preliminary"
        image_type: ".png"
        cms_text_color: Black
        legend_num_cols: 1

  default_plot_config:
    cms_text: "Preliminary"
    image_type: ".png"
    cms_text_color: Black
    legend_num_cols: 2


  default_style_set:
    styles:
      - pattern:
          dataset_name: 'data*'
        style:
          plottype: errorbar
          color: black
          linestyle: null
          marker: 'o'
      - pattern:
          sample_type: 'MC'
        style:
          plottype: fill
      
