{% import "singlestop_base.yaml" as base %}

analyzer:
  default_run_builder:
    strategy_name: NoSystematics

  Signal312:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
      should_run:
        sample_type: Data
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: TriggerBNNCorrection
      base_path: postprocessing/newtriggereffs/
      correction_pattern: "{era}.json.gz"
    - module_name: NObjFilter
      input_col: MedB
      selection_name: 2bjet
      min_count: 2
    - module_name: NObjFilter
      input_col: TightB
      selection_name: 1tightbjet
      min_count: 1
    - module_name: VecDRSelection
      input_col: MedB
      selection_name: b_dr
      min_dr: 1.0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: selection

  Signal312MSD:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
      should_run:
        sample_type: Data
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: TriggerBNNCorrection
      base_path: postprocessing/newtriggereffs/
      correction_pattern: "{era}.json.gz"
    - module_name: NObjFilter
      input_col: MedB
      selection_name: 2bjet
      min_count: 2
    - module_name: NObjFilter
      input_col: TightB
      selection_name: 1tightbjet
      min_count: 1
    - module_name: VecDRSelection
      input_col: MedB
      selection_name: b_dr
      min_dr: 1.0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SimpleMSDSelection
    - module_name: SelectOnColumns
      sel_name: selection

  Signal313:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
      should_run:
        sample_type: Data
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: TriggerBNNCorrection
      base_path: postprocessing/newtriggereffs/
      correction_pattern: "{era}.json.gz"
    - module_name: NObjFilter
      input_col: TightB
      selection_name: 3tightbjet
      min_count: 3
    - module_name: VecDRSelection
      input_col: MedB
      selection_name: b_dr
      min_dr: 1.0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: selection

  Signal313MSD:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
      should_run:
        sample_type: Data
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: TriggerBNNCorrection
      base_path: postprocessing/newtriggereffs/
      correction_pattern: "{era}.json.gz"
    - module_name: NObjFilter
      input_col: TightB
      selection_name: 3tightbjet
      min_count: 3
    - module_name: VecDRSelection
      input_col: MedB
      selection_name: b_dr
      min_dr: 1.0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: selection

location_priorities: [".*FNAL.*", ".*US.*", ".*(DE|IT|CH|FR).*", ".*(T0|T1|T2).*","eos"]

event_collections:
  # DO NOT UNCOMMENT!!!!!!!
  # - dataset: 'data_JetHT_*'
  #   pipelines: [Signal312, Signal313]

  # Data samples
  - dataset: 'signal_2018_312_1500_600_official'
    pipelines: [Signal312, Signal312MSD]
  - dataset: 'signal_2018_312_1000_400_official'
    pipelines: [Signal312, Signal312MSD]
  - dataset: 'signal_2018_312_2000_600_official'
    pipelines: [Signal312, Signal312MSD]
  - dataset: 'signal_2018_312_1200_1100_official'
    pipelines: [Signal312, Signal312MSD]
  - dataset: 'signal_2018_312_2000_1900_official'
    pipelines: [Signal312, Signal312MSD]

  - dataset: 'signal_2018_313_1500_600_official'
    pipelines: [Signal313, Signal313MSD]
  - dataset: 'signal_2018_313_1000_400_official'
    pipelines: [Signal313, Signal313MSD]
  - dataset: 'signal_2018_313_2000_600_official'
    pipelines: [Signal313, Signal313MSD]
  - dataset: 'signal_2018_313_1200_1100_official'
    pipelines: [Signal313, Signal313MSD]
  - dataset: 'signal_2018_313_2000_1900_official'
    pipelines: [Signal313, Signal313MSD]
  
  
extra_executors:
  test:
    executor_name: ImmediateExecutor
    chunk_size: 10000

  test2:
    executor_name: LocalDaskExecutor
    chunk_size: 100000
    min_workers: 1
    max_workers: 3
    reduction_factor: 2
  
  testcondor:
    executor_name: LPCCondorDask
    container: /cvmfs/unpacked.cern.ch/registry.hub.docker.com/coffeateam/coffea-dask-almalinux9:2025.10.2-py3.12
    venv_path: .venv
    chunk_size: 80000
    min_workers: 40
    max_workers: 200
    worker_memory: 4GB
    reduction_factor: 5

