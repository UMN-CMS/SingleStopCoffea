{% macro  handle2D(inputs) %}
- name: Histogram2D
  inputs: {{ inputs | tojson }}
  structure:
    select: {dataset_name: "*"}
    group: {era.name: "*", pipeline: "*"}
    transforms:
      - name: NormalizeSystematicByProjection
        normalize_within: ["HT_Cat"]
        pre_sf_name: "bjetshapesf-variation_disabled"
        variation_axis: "variation"
      - name: MergeAxes
        merge_axis_names: ["HT_Cat"]
      - name: SelectAxesValues
        select_axes_values: 
          variation: ["central"]
  output_name: "{prefix}/control/{era.name}/{dataset_name}/{era.name}_{name}.png"

- name: Dump
  inputs: {{ inputs | tojson }}
  structure:
    select: {dataset_name: "*"}
    group: {era.name: "*", pipeline: "*"}
    transforms:
      - name: NormalizeSystematicByProjection
        normalize_within: ["HT_Cat"]
        pre_sf_name: "bjetshapesf-variation_disabled"
        variation_axis: "variation"
      - name: MergeAxes
        merge_axis_names: ["HT_Cat"]
      - name: SelectAxesValues
        select_axes_values: 
          variation: ["central"]
  output_name: "{prefix}/control/{era.name}/{dataset_name}/{era.name}_{name}.pklz4"
{% endmacro %}